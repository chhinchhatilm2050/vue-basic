<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Store</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Asap&family=Lobster&display=swap" rel="stylesheet">
  <style>
    body {
        font-family: "Asap", sans-serif;
    }
    .btn {
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        background: #2563eb;
    }
  </style>
</head>

<body class="bg-white-900 text-white min-h-screen p-6">

<div id="app">
  <h1 class="text-3xl text-black font-bold text-center mb-6"> Product Store</h1>
  <div class="flex flex-wrap gap-3 justify-center mb-4">
    <button @click="stockFilter = 'all'" class="btn">All</button>
    <button @click="stockFilter = 'in'" class="btn bg-green-600">In Stock</button>
    <button @click="stockFilter = 'out'" class="btn bg-red-600">Out of Stock</button>
  </div>


  <div class="flex flex-wrap gap-3 justify-center mb-4">
    <button @click="categoryFilter = 'All'" class="btn">All</button>
    <button v-for="cat in categories" :key="cat"
      @click="categoryFilter = cat"
      class="btn bg-gray-700">
      {{ cat }}
    </button>
  </div>

  <div class="flex justify-center mb-8 gap-4">
    <select v-model="sortOption"
      class="bg-gray-800 border border-gray-600 px-4 py-2 rounded">
      <option value="">Sort by</option>
      <option value="priceAsc">Price: Low → High</option>
      <option value="priceDesc">Price: High → Low</option>
      <option value="name">Name A-Z</option>
      <option value="rating">Rating High → Low</option>
    </select>
    <input v-model="searchName" type="text" class="border-2 border-blue-700 rounded-sm placeholder-gray-400 text-black px-4" placeholder="Search..." >
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

    <div v-for="product in filteredProducts" :key="product.id"
      class="rounded-xl p-4"
      :class="product.inStock ? 'bg-gray-600 border'
                              : 'bg-gray-600 border'">

      <img :src="product.image" class="rounded mb-3">
      <h2 class="text-lg font-semibold">{{ product.name }}</h2>
      <p class="text-sm text-gray-400">{{ product.category }}</p>
      <p class="text-xl font-bold text-white-400">${{ product.price }}</p>

      <p :class="product.inStock ? 'text-blue-600' : 'text-red-600'">
        {{ product.inStock ? 'In Stock' : 'Out of Stock' }}
      </p>

      <p class="text-yellow-400">
        {{ '⭐'.repeat(product.rating) }}
      </p>

      <div class="flex gap-2 mt-4">
        <button @click="toggleStock(product)"
          class="flex-1 bg-blue-500 text-black py-1 rounded">
          Stock
        </button>

        <button @click="deleteProduct(product.id)"
          class="flex-1 bg-red-600 py-1 rounded">
          Delete
        </button>
      </div>
     
    </div>

  </div>
</div>

<script>
const { createApp } = Vue

createApp({
  data() {
    return {
      stockFilter: 'all',
      categoryFilter: 'All',
      sortOption: '',
      searchName: '',
      products: [
        { id: 1, name: 'Smartphone', price: 699, category: 'Electronics', inStock: true, rating: 5, image: './img/d835c3944ca58d05e142b396f18a146c.jpg' },
        { id: 2, name: 'T-Shirt', price: 25, category: 'Clothing', inStock: false, rating: 4, image: './img/de8d474cd346eb3bad31eca1578bf56e.jpg' },
        { id: 3, name: 'Laptop', price: 1200, category: 'Electronics', inStock: true, rating: 5, image: './img/laptop.jpg' },
        { id: 4, name: 'Book', price: 15, category: 'Books', inStock: true, rating: 4, image: './img/book.jpg' },
        { id: 5, name: 'Chocolate', price: 5, category: 'Food', inStock: false, rating: 3, image: './img/chocolate.jpg' },
        { id: 6, name: 'Headphones', price: 99, category: 'Electronics', inStock: true, rating: 4, image: './img/headphone.jpg' },
        { id: 7, name: 'Jeans', price: 40, category: 'Clothing', inStock: true, rating: 4, image: './img/jean.jpg' },
        { id: 8, name: 'Snack Box', price: 12, category: 'Food', inStock: false, rating: 3, image: './img/snack.jpg' }
      ]
    }
  },

  computed: {
    categories() {
      let categoryList = []
      this.products.forEach(product => {
        if (!categoryList.includes(product.category)) {
          categoryList.push(product.category)
        }
      })
      return categoryList
    },

    filteredProducts() {
      debugger;
      let list = [...this.products]
      if (this.stockFilter === 'in') {
        list = list.filter(p => p.inStock)
      }
      if (this.stockFilter === 'out') {
        list = list.filter(p => !p.inStock)
      }

      if (this.categoryFilter !== 'All') {
        list = list.filter(p => p.category === this.categoryFilter)
      }

      if(this.searchName !== '') {
        const keyWord = this.searchName.toLowerCase();
        list = list.filter(product => product.name.toLowerCase().includes(keyWord));
      }

      if (this.sortOption === 'priceAsc') {
        list.sort((a, b) => a.price - b.price)
      }
      if (this.sortOption === 'priceDesc') {
        list.sort((a, b) => b.price - a.price)
      }
      if (this.sortOption === 'name') {
        list.sort((a, b) => a.name.localeCompare(b.name))
      }
      if (this.sortOption === 'rating') {
        list.sort((a, b) => b.rating - a.rating)
      }

      return list;
    }
  },

  methods: {
    toggleStock(product) {
      product.inStock = !product.inStock
    },

    deleteProduct(id) {
      this.products = this.products.filter(p => p.id !== id)
    }
  }
}).mount('#app');
</script>

</body>
</html>

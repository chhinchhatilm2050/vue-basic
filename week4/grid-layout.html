<!DOCTYPE html>
<html>
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
        }
        
        .grid-layout {
            display: grid;
            grid-template-areas:
                "header header"
                "sidebar main"
                "footer footer";
            grid-template-columns: 250px 1fr;
            grid-template-rows: 80px 1fr 60px;
            min-height: 100vh;
            gap: 10px;
            padding: 10px;
            background: #f5f5f5;
        }
        
        .header {
            grid-area: header;
            background: #1976D2;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
        }
        
        .sidebar {
            grid-area: sidebar;
            background: #E3F2FD;
            padding: 20px;
        }
        
        .main {
            grid-area: main;
            background: white;
            padding: 20px;
        }
        
        .footer {
            grid-area: footer;
            background: #424242;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="grid-layout">
        <header class="header">
            <h1>My Website</h1>
        </header>
        
        <aside class="sidebar">
            <h3>Navigation</h3>
            <ul>
                <li>Dashboard</li>
                <li>Profile</li>
                <li>Settings</li>
            </ul>
        </aside>
        
        <main class="main">
            <h2>Main Content</h2>
            <p>Your content here...</p>
        </main>
        
        <footer class="footer">
            <p>&copy; 2026 My Website</p>
        </footer>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">
  <div id="app">
    <alert-box>
  <h3>⚠️ Warning</h3>

</alert-box>
  </div>

  <script>

    app.mount('#app');

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notes UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-100 min-h-screen p-6">

  <h1 class="text-3xl font-bold text-center mb-6">Notes</h1>

  <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow mb-8">
    <h2 class="text-lg font-semibold mb-4">Create Note</h2>

    <div class="mb-4">
      <input
        type="text" id="title"
        class="w-full border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <span id="require-title" class="hidden text-red-600">Require</span>
      <p class="text-sm text-gray-500 text-right mt-1">0 / 50</p>
    </div>

    <div class="mb-4">
      <h2 class="text-lg font-semibold mb-4">Description</h2>
      <textarea
        id="content"
        rows="4"
        class="w-full border rounded-lg p-2 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
      ></textarea>
      <span id="require-content" class="hidden text-red-600">Require</span>
      <p class="text-sm text-gray-500 text-right mt-1">0 / 500</p>
    </div>

    <button id="save-note"
      class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
    >
      Save Note
    </button>
  </div>

  <div id="note-list" class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

  </div>
  <script>
    let notes = [];
    const savedNotes = JSON.parse(localStorage.getItem('notes'));
      if (savedNotes) {
        notes = savedNotes;
        renderNote();
    }
    const saveNote = document.getElementById('save-note');
    const titleInput = document.getElementById('title');
    const contentInput = document.getElementById('content');
    const requireTitle = document.getElementById('require-title');
    const requireContent = document.getElementById('require-content');
    function addNote() {
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();
      if(!validation(title, content)){
        return;
      };
      const newNote = {
        id: Date.now(),
        title,
        content,
        date: new Date().toLocaleString(),
      }
      notes.push(newNote);
      localStorage.setItem('notes', JSON.stringify(notes));
      renderNote();
      titleInput.value = '';
      contentInput.value = '';
    }
    function validation(title, content) {
      let isValid = true;
       if(title === '') {
          requireTitle.classList.remove('hidden');
          isValid = false;
        }else {
          requireTitle.classList.add('hidden');
        }
        if(content === '') {
          isValid = false;
          requireContent.classList.remove('hidden');
        } else {
          requireContent.classList.add('hidden');
        }
        return isValid;
    }
    titleInput.addEventListener('blur', () => {
      validation(titleInput.value.trim(), contentInput.value.trim())
    })
    contentInput.addEventListener('blur', () => {
      validation(titleInput.value.trim(), contentInput.value.trim())
    })

    
    saveNote.addEventListener('click', () => {
      addNote();
    });

    function renderNote() {
      const noteList = document.getElementById('note-list');
      noteList.innerHTML = '';
      notes.forEach(note => {
        noteList.innerHTML += `
          <div class="bg-gray-100 p-4 rounded-xl shadow">
            <h3 class="font-bold text-lg truncate">${note.title}</h3>
            <p class="text-gray-700 text-sm mt-2 line-clamp-3">
              ${note.content}
            </p>
            <p class="text-xs text-gray-500 mt-3">${note.date}</p>

            <div class="flex justify-end gap-3 mt-4">
              <button onclick="editNote(${note.id})" class="text-blue-600 hover:underline">Edit</button>
              <button onclick="deleteNote(${note.id})" class="text-red-600 hover:underline">Delete</button>
            </div>
          </div>
        `
      })
    }
    function editNote(id) {
      const note = notes.find(item => item.id === id);
      if (note) {
        titleInput.value = note.title;
        contentInput.value = note.content;
        notes = notes.filter(item => item.id !== id);
        localStorage.setItem('notes', JSON.stringify(notes));
      }
    }

    function deleteNote(id) {
      notes = notes.filter(item => item.id !== id);
      localStorage.setItem('notes', JSON.stringify(notes));
      renderNote();
    }

  </script>

</body>
</html>

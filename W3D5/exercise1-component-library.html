<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue Component Showcase</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

  <div id="app" class="space-y-10">

    <!-- Button Component Demo -->
    <section class="space-y-2">
      <h2 class="text-2xl font-bold">Custom Button</h2>
      <div class="flex gap-2">
        <custom-button label="Primary" color="primary" size="small" @click="onButtonClick"></custom-button>
        <custom-button label="Secondary" color="secondary" size="medium" @click="onButtonClick"></custom-button>
        <custom-button label="Danger" color="danger" size="large" @click="onButtonClick"></custom-button>
      </div>
      <p>Last clicked: {{ lastClicked }}</p>
    </section>

    <!-- Card Component Demo -->
    <section class="space-y-2">
      <h2 class="text-2xl font-bold">Info Card</h2>
      <info-card 
        title="Vue Card Component" 
        content="This is a long description that can be expanded or collapsed. It shows how slots and toggle work in a reusable component."
        image-url="https://via.placeholder.com/150">
        <template #header>
          <p class="text-blue-600 font-semibold">Custom Header Slot</p>
        </template>
        <template #footer>
          <p class="text-gray-500 text-sm">Custom Footer Slot</p>
        </template>
      </info-card>
    </section>

    <!-- Alert Component Demo -->
    <section class="space-y-2">
      <h2 class="text-2xl font-bold">Alert Box</h2>
      <div class="flex gap-2">
        <alert-box message="Info Alert" type="info"></alert-box>
        <alert-box message="Success Alert" type="success"></alert-box>
        <alert-box message="Warning Alert" type="warning"></alert-box>
        <alert-box message="Error Alert" type="error"></alert-box>
      </div>
    </section>

    <!-- Badge Component Demo -->
    <section class="space-y-2">
      <h2 class="text-2xl font-bold">Status Badge</h2>
      <div class="flex gap-2">
        <status-badge text="Active" status="active"></status-badge>
        <status-badge text="Pending" status="pending"></status-badge>
        <status-badge text="Inactive" status="inactive"></status-badge>
        <status-badge text="Completed" status="completed" :icon="true"></status-badge>
      </div>
    </section>

    <!-- Progress Bar Component Demo -->
    <section class="space-y-2">
      <h2 class="text-2xl font-bold">Progress Bar</h2>
      <progress-bar current="20" max="100" label="Task 1"></progress-bar>
      <progress-bar current="50" max="100" label="Task 2"></progress-bar>
      <progress-bar current="90" max="100" label="Task 3"></progress-bar>
    </section>

    <!-- Avatar Component Demo -->
    <section class="space-y-2">
      <h2 class="text-2xl font-bold">User Avatar</h2>
      <div class="flex gap-4 items-center">
        <user-avatar name="Alice" size="small" image-url=""></user-avatar>
        <user-avatar name="Bob" size="medium" image-url="https://via.placeholder.com/48"></user-avatar>
        <user-avatar name="Charlie" size="large" image-url="" :online="true"></user-avatar>
      </div>
    </section>

  </div>

  <script>
    const { createApp, ref, computed } = Vue;

    createApp({
      setup() {
        const lastClicked = ref('');

        const onButtonClick = (label) => {
          lastClicked.value = label;
        };

        return { lastClicked, onButtonClick };
      },
      components: {

        // Custom Button
        'custom-button': {
          props: {
            label: String,
            color: { type: String, default: 'primary' },
            size: { type: String, default: 'medium' }
          },
          data() {
            return { count: 0 };
          },
          computed: {
            classes() {
              let base = 'rounded font-semibold text-white';
              let color = {
                primary: 'bg-blue-500 hover:bg-blue-600',
                secondary: 'bg-gray-500 hover:bg-gray-600',
                danger: 'bg-red-500 hover:bg-red-600'
              }[this.color] || 'bg-blue-500';
              let size = {
                small: 'px-2 py-1 text-sm',
                medium: 'px-4 py-2 text-base',
                large: 'px-6 py-3 text-lg'
              }[this.size] || 'px-4 py-2';
              return `${base} ${color} ${size}`;
            }
          },
          template: `
            <button :class="classes" @click="handleClick">
              {{ label }} ({{ count }})
            </button>
          `,
          methods: {
            handleClick() {
              this.count++;
              this.$emit('click', this.label);
            }
          }
        },

        // Info Card
        'info-card': {
          props: ['title', 'content', 'imageUrl'],
          data() {
            return { expanded: false };
          },
          template: `
            <div class="bg-white p-4 rounded shadow-md w-96">
              <div class="mb-2" v-if="$slots.header"><slot name="header"></slot></div>
              <h3 class="font-bold text-lg mb-2">{{ title }}</h3>
              <img v-if="imageUrl" :src="imageUrl" alt="" class="mb-2 w-full h-32 object-cover rounded">
              <p>{{ expanded ? content : content.slice(0, 50) + (content.length > 50 ? '...' : '') }}</p>
              <button class="text-blue-500 mt-2" @click="expanded = !expanded">
                {{ expanded ? 'Collapse' : 'Expand' }}
              </button>
              <div class="mt-2" v-if="$slots.footer"><slot name="footer"></slot></div>
            </div>
          `
        },

        // Alert Box
        'alert-box': {
          props: ['message', 'type'],
          data() {
            return { visible: true };
          },
          computed: {
            classes() {
              const base = 'p-3 rounded mb-2 text-white flex justify-between items-center';
              const colors = {
                info: 'bg-blue-500',
                success: 'bg-green-500',
                warning: 'bg-yellow-500 text-black',
                error: 'bg-red-500'
              };
              return `${base} ${colors[this.type] || colors.info}`;
            }
          },
          mounted() {
            setTimeout(() => this.visible = false, 5000);
          },
          template: `
            <div v-if="visible" :class="classes">
              <span>{{ message }}</span>
              <button @click="visible=false" class="ml-2 font-bold">×</button>
            </div>
          `
        },

        // Status Badge
        'status-badge': {
          props: { text: String, status: String, icon: { type: Boolean, default: false } },
          computed: {
            classes() {
              const colors = {
                active: 'bg-green-500',
                pending: 'bg-yellow-500 text-black',
                inactive: 'bg-gray-500',
                completed: 'bg-blue-500'
              };
              return `px-2 py-1 rounded text-white inline-flex items-center gap-1 ${colors[this.status] || 'bg-gray-500'}`;
            }
          },
          template: `<span :class="classes"><span v-if="icon">✔</span> {{ text }}</span>`
        },

        // Progress Bar
        'progress-bar': {
          props: ['current', 'max', 'label'],
          computed: {
            percentage() { return Math.round((this.current / this.max) * 100); },
            barColor() {
              if (this.percentage < 30) return 'bg-red-500';
              if (this.percentage < 70) return 'bg-yellow-500';
              return 'bg-green-500';
            }
          },
          template: `
            <div class="w-96 bg-gray-300 rounded overflow-hidden mb-2">
              <div class="flex justify-between mb-1">
                <span class="font-semibold">{{ label }}</span>
                <span>{{ percentage }}%</span>
              </div>
              <div class="h-4 rounded" :class="barColor" :style="{width: percentage + '%'}"></div>
            </div>
          `
        },

        // User Avatar
        'user-avatar': {
          props: ['name', 'imageUrl', 'size', 'online'],
          computed: {
            displaySize() {
              return { small: 32, medium: 48, large: 64 }[this.size] || 48;
            },
            initials() {
              return this.name.split(' ').map(n => n[0]).join('').toUpperCase();
            }
          },
          template: `
            <div class="relative inline-block">
              <img v-if="imageUrl" :src="imageUrl" :alt="name" class="rounded-full" :style="{width: displaySize + 'px', height: displaySize + 'px'}">
              <div v-else class="bg-gray-500 text-white rounded-full flex items-center justify-center font-bold" :style="{width: displaySize + 'px', height: displaySize + 'px'}">
                {{ initials }}
              </div>
              <span v-if="online" class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
            </div>
          `
        }

      }
    }).mount('#app');
  </script>
</body>
</html>

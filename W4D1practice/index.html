<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vue Product Card with v-for</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
  <div id="app" class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold mb-8 text-center">Product List</h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Use v-for to loop through products -->
      <product-card
        v-for="(product, index) in products"
        :key="index"
        :title="product.title"
        :price="product.price"
        :image="product.image"
        :rating="product.rating"
        :in-stock="product.inStock"
      ></product-card>
    </div>
  </div>

  <script>
    const app = Vue.createApp({
      data() {
        return {
          products: [
            {
              title: "Wireless Headphones",
              price: 99.99,
              image: "https://via.placeholder.com/300x200",
              rating: 5,
              inStock: true
            },
            {
              title: "Smart Watch",
              price: 149.5,
              image: "https://via.placeholder.com/300x200?text=No+Image",
              rating: 3,
              inStock: false
            },
            {
              title: "Gaming Mouse",
              price: 45,
              image: "https://via.placeholder.com/300x200?text=Mouse",
              rating: 4,
              inStock: true
            }
          ]
        }
      }
    });

    app.component("product-card", {
      props: {
        title: { type: String, required: true },
        price: { type: Number, required: true },
        image: { 
          type: String, 
          default: "https://via.placeholder.com/300x200?text=No+Image" 
        },
        inStock: { type: Boolean, default: true },
        rating: { 
          type: Number, 
          required: true, 
          validator(value) { return value >= 1 && value <= 5; } 
        }
      },
      template: `
        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition transform hover:scale-105 duration-200">
          <img :src="image" class="w-full h-48 object-cover" />

          <div class="p-5">
            <h2 class="text-lg font-semibold mb-2">{{ title }}</h2>
            <p class="text-gray-700 mb-2">\${{ price.toFixed(2) }}</p>
            <p :class="inStock ? 'text-green-600' : 'text-red-600'" class="font-medium mb-3">
              {{ inStock ? 'In Stock' : 'Out of Stock' }}
            </p>
            <div class="flex items-center">
              <span v-for="star in 5" :key="star" class="text-xl" :class="star <= rating ? 'text-yellow-400' : 'text-gray-300'">★</span>
              <span class="ml-2 text-sm text-gray-500">({{ rating }}/5)</span>
            </div>
          </div>
        </div>
      `
    });

    app.mount("#app");
  </script>
</body>
</html>

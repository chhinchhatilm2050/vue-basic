<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Personal Finance Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Asap&family=Lobster&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css">
  <link rel="stylesheet" href="personalfinance.css">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
<header class="relative bg-blue-500 text-white p-4 shadow">
  <h1 class="text-2xl font-bold text-center">Personal Finance Tracker</h1>
  <button id="darkToggle"
    class="absolute right-7 top-4 bg-white text-gray-900 px-3 py-1 rounded text-sm cursor-pointer">
    <i class="ri-moon-line"></i>
  </button>
</header>

<main class="max-w-6xl mx-auto p-4 space-y-6">
  <section class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="bg-white p-4 rounded shadow">
      <h2 class="text-gray-700 board">Balance</h2>
      <p id="balance" class="text-2xl font-bold text-blue-700">$ 0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h2 class="text-gray-700 board">Total Income</h2>
      <p id="income" class="text-2xl font-bold text-blue-500">$ 0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h2 class="text-gray-700 board">Total Expenses</h2>
      <p id="expense" class="text-2xl font-bold text-red-500">$ 0</p>
    </div>
  </section>

  <section class="bg-white p-4 rounded shadow">
    <h2 class="font-bold mb-3 text-lg">Add Transaction</h2>

    <form id="transactionForm" class="grid grid-cols-1 md:grid-cols-5 gap-3">
      <div>
        <label class="text-sm text-gray-600">Type <span class="text-red-600">*</span></label>
        <select id="type" class="border p-1.5 rounded border-gray-200 w-full">
          <option value="">Type</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>

      <div>
        <label class="text-sm text-gray-600">Categories <span class="text-red-600">*</span></label>
        <select id="category" class="border p-1.5 rounded border-gray-200 w-full">
          <option value="">Category</option>
          <option>Salary</option>
          <option>Food</option>
          <option>Transport</option>
          <option>Entertainment</option>
          <option>Shopping</option>
          <option>Bills</option>
          <option>Other</option>
        </select>
      </div>

      <div>
        <label class="text-sm text-gray-600">Amount <span class="text-red-600">*</span></label>
        <input id="amount" type="text" class="border p-1 rounded border-gray-200 w-full" />
      </div>

      <div>
        <label class="text-sm text-gray-600">Description <span class="text-red-600">*</span></label>
        <input id="description" type="text" class="border p-1 rounded border-gray-200 w-full" maxlength="100" />
      </div>

      <div>
        <label class="text-sm text-gray-600">Date <span class="text-red-600">*</span></label>
        <input value="date.now()" id="date" type="date" class="border p-1 rounded border-gray-200 w-full" />
      </div>

      <button id="submitBtn"
        class="md:col-span-5 bg-blue-500 text-white p-2 rounded disabled:opacity-50 cursor-not-allowed"
        disabled>
        Add Transaction
      </button>
    </form>

    <p id="errorMsg" class="text-red-500 mt-2 text-sm"></p>
  </section>
  <section class="bg-white p-4 rounded shadow grid grid-cols-1 md:grid-cols-4 gap-3">
    <select id="filterType" class="border p-2 rounded  border-gray-200">
      <option value="all">All Types</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <select id="filterCategory" class="border p-2 rounded border-gray-200">
      <option value="all">All Categories</option>
      <option>Salary</option>
      <option>Food</option>
      <option>Transport</option>
      <option>Entertainment</option>
      <option>Shopping</option>
      <option>Bills</option>
      <option>Other</option>
    </select>

    <select id="sortBy" class="border p-2 rounded border-gray-200">
      <option value="date-desc">Date (Newest)</option>
      <option value="date-asc">Date (Oldest)</option>
      <option value="amount-desc">Amount (High)</option>
      <option value="amount-asc">Amount (Low)</option>
    </select>

    <input id="search" type="text" placeholder="Search description"
      class="border p-2 rounded border-gray-200" />
  </section>

  <section id="transactionList" class="space-y-3">

  </section>
  <section class="bg-white p-4 rounded shadow flex justify-between gap-3">
    <label class="bg-blue-500 text-white px-4 py-2 rounded cursor-pointer">
      <i class="ri-contacts-book-upload-line"></i> Import JSON
      <input type="file" id="importJson" accept=".json" hidden>
    </label>
    <div class="flex gap-4">
      <button id="exportJson" class="bg-blue-600 text-white px-4 py-2 rounded cursor-pointer">
        <i class="ri-export-line"></i> Export JSON
      </button>
      <button id="exportCsv" class="bg-blue-600 text-white px-4 py-2 rounded cursor-pointer">
        <i class="ri-export-line"></i> Export CSV
      </button>
    </div>
  </section>

</main>
<script src="personalfinance.js"></script>
</body>
</html>

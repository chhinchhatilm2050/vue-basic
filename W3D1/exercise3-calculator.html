
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Asap&family=Lobster&display=swap" rel="stylesheet">
  <style>
    body {
        font-family: "Asap", sans-serif;
    }
  </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">
  <div id="app" class="w-72 bg-black rounded-2xl shadow-xl p-4">

    <div class="text-right text-white text-4xl font-light mb-4 overflow-hidden">
      {{result}}
    </div>

    <div class="grid grid-cols-4 gap-3">
      <button @click="clearAll" class="btn bg-gray-500 rounded-2xl cursor-pointer active:bg-white">AC</button>
      <button @click="toggleSign" class="btn bg-gray-500 rounded-2xl cursor-pointer active:bg-white">±</button>
      <button @click="percent" class="btn bg-gray-500 rounded-2xl cursor-pointer active:bg-white">%</button>
      <button @click="setOperator('/')" class="btn bg-orange-500 rounded-2xl cursor-pointer active:bg-white">÷</button>

      <button @click="inputNumber('7')" class="btn bg-gray-700 rounded-2xl cursor-pointer active:bg-white">7</button>
      <button @click="inputNumber('8')" class="btn bg-gray-700 rounded-2xl cursor-pointer active:bg-white">8</button>
      <button @click="inputNumber('9')" class="btn bg-gray-700 rounded-2xl cursor-pointer active:bg-white">9</button>
      <button @click="setOperator('*')" class="btn bg-orange-500 rounded-2xl cursor-pointer active:bg-white">×</button>

      <button @click="inputNumber('4')" class="btn bg-gray-700 rounded-2xl cursor-pointer active:bg-white">4</button>
      <button @click="inputNumber('5')" class="btn bg-gray-700 rounded-2xl cursor-pointer active:bg-white">5</button>
      <button @click="inputNumber('6')" class="btn bg-gray-700 rounded-2xl cursor-pointer active:bg-white">6</button>
      <button @click="setOperator('-')" class="btn bg-orange-500 rounded-2xl cursor-pointer active:bg-white">−</button>

      <button @click="inputNumber('1')" class="btn bg-gray-700 rounded-2xl cursor-pointer active:bg-white">1</button>
      <button @click="inputNumber('2')" class="btn bg-gray-700 rounded-2xl cursor-pointer active:bg-white">2</button>
      <button @click="inputNumber('3')" class="btn bg-gray-700 rounded-2xl cursor-pointer active:bg-white">3</button>
      <button @click="setOperator('+')" class="btn bg-orange-500 rounded-2xl cursor-pointer active:bg-white">+</button>

      <button @click="inputNumber('0')" class="btn bg-gray-700 col-span-2 text-left pl-6 rounded-2xl cursor-pointer active:bg-white">0</button>
      <button @click="inputDecimal" class="btn bg-gray-700 rounded-2xl cursor-pointer active:bg-white">.</button>
      <button @click="calculate" class="btn bg-orange-500 rounded-2xl cursor-pointer active:bg-white">=</button>
    </div>
  </div>
  <script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      result: "0",
      operator: null,
      firstValue: null,
      isNewInput: false,
    };
  },
  methods: {
    inputNumber(num) {
      if (this.isNewInput) {
        this.result = num;
        this.isNewInput = false;
      } else {
        this.result = this.result === "0" ? num : this.result + num;
      }
    },

    inputDecimal() {
      if (!this.result.includes(".")) {
        this.result += ".";
      }
    },

    clearAll() {
      this.result = "0";
      this.operator = null;
      this.firstValue = null;
      this.isNewInput = false;
    },

    toggleSign() {
      this.result = (parseFloat(this.result) * -1).toString();
    },

    percent() {
      this.result = (parseFloat(this.result) / 100).toString();
    },

    setOperator(op) {
      this.firstValue = parseFloat(this.result);
      this.operator = op;
      this.isNewInput = true;
    },

    calculate() {
      if (this.operator === null) return;
      const secondValue = parseFloat(this.result);
      let calc = 0;
      if (this.operator === "/" && secondValue === 0) {
        this.result = "Error";
        this.operator = null;
        this.firstValue = null;
        this.isNewInput = false;
        return;
     }
      switch (this.operator) {
        case "+":
          calc = this.firstValue + secondValue;
          break;
        case "-":
          calc = this.firstValue - secondValue;
          break;
        case "*":
          calc = this.firstValue * secondValue;
          break;
        case "/":
          calc = this.firstValue / secondValue;
          break;
      }
      this.result = calc.toString();
      this.operator = null;
      this.firstValue = null;
    },
  },
  }).mount("#app");
</script>


</body>
</html>

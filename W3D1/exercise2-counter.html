<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter App</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body class="bg-gray-900 min-h-screen flex items-center justify-center">
  <div id="app" class="bg-black text-white w-80 p-6 rounded-2xl shadow-xl">

    <div
      class="text-center text-5xl font-bold mb-2"
      :style="{ color: counterColor }"
    >
      {{ count }}
    </div>
    <p class="text-center mb-4 text-gray-300">
      {{ message }}
    </p>

    <div class="grid grid-cols-3 gap-3 mb-4">
      <button @click="increment(1)" class=" bg-green-600 rounded-sm">+1</button>
      <button @click="increment(5)" class=" bg-green-600 rounded-sm">+5</button>
      <button @click="increment(10)" class=" bg-green-600 rounded-sm">+10</button>

      <button @click="decrement" class="btn col-span-2 bg-green-600 rounded-sm">-1</button>
      <button @click="reset" class="btn bg-red-600 rounded-sm">Reset</button>
    </div>

    <div class="flex gap-2">
      <input
        v-model.number="customValue"
        type="text"
        placeholder="Enter value"
        class="w-full px-3 py-2 rounded bg-gray-800 text-white outline-none"
      />
      <button @click="resetCustom" class="btn bg-green-600 px-3 rounded-sm">
        Set
      </button>
    </div>

  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          count: 0,
          customValue: null,
        };
      },

      computed: {
        message() {
          if (this.count < 0) {
            return "Below zero!"; 
          } else if (this.count === 0) {
            return "Just started!";
          } else if (this.count > 0 && this.count < 50) {
            return "Getting there!";
          } else if (this.count === 50) {
            return "Halfway to 100!";
          } else if (this.count > 50 && this.count < 100) {
            return "Almost there!"
          } else {
            return "Century"
          }
        },

        counterColor() {
          if (this.count < 0) {
            return "red";
          } else if (this.count < 50) {
            return "blue"; 
          } else if (this.count < 100) {
            return "orange";
          } else {
            return "green";
          }
        },
      },

      methods: {
        counterColor() {
            if(this.count <0 ) return "red";

        },

        increment(value) {
          this.count += value;
        },

        decrement() {
          this.count -= 1;
        },

        reset() {
          this.count = 0;
        },

        resetCustom() {
          if (this.customValue !== null) {
            this.count = this.customValue;
          }
          this.customValue = null;
        },
      },
    }).mount("#app");
  </script>
</body>
</html>

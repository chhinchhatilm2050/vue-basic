<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Save Notes</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">
  <div id="app">
    <notes-component></notes-component>
  </div>

  <script>
    const { createApp } = Vue;

    // ✅ CREATE APP
    const app = createApp({});

    // ✅ REGISTER COMPONENT
    app.component('notes-component', {
      data() {
        return {
          notes: '',
          saveStatus: 'loaded', // loaded | saving | saved
          saveTimer: null
        }
      },
      template: `
        <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-6">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold">📝 My Notes</h2>
            <span class="text-sm" :class="{
              'text-gray-500': saveStatus === 'loaded',
              'text-blue-500': saveStatus === 'saving',
              'text-green-500': saveStatus === 'saved'
            }">
              {{ saveStatus === 'saving'
                ? 'Saving...'
                : saveStatus === 'saved'
                ? '✓ Saved'
                : '' }}
            </span>
          </div>

          <textarea
            v-model="notes"
            rows="15"
            placeholder="Start typing your notes..."
            class="w-full px-4 py-3 border border-gray-300 rounded-lg
                   focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono">
          </textarea>

          <p class="text-sm text-gray-500 mt-2">
            Character count: {{ notes.length }}
          </p>
        </div>
      `,
      created() {
        const saved = localStorage.getItem('notes');
        if (saved) {
          this.notes = saved;
        }
        console.log('Notes loaded from localStorage');
      },
      watch: {
        notes() {
          this.saveStatus = 'saving';
          this.saveTimer = setTimeout(() => {
            this.saveNotes();
          }, 1000);
        }
      },
      unmounted() {
        clearTimeout(this.saveTimer);
      },
      methods: {
        saveNotes() {
          localStorage.setItem('notes', this.notes);
          this.saveStatus = 'saved';
        }
      }
    });

    // ✅ MOUNT APP
    app.mount('#app');
  </script>
</body>
</html>

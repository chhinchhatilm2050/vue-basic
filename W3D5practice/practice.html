<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component-Based App</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
  <div id="app" class="max-w-7xl mx-auto">
    <app-header :total-products="products.length"></app-header>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <product-card 
        v-for="product in products" 
        :key="product.id"
        :product="product">
      </product-card>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    const app = createApp({
      data() {
        return {
          products: [
            {
              id: 1,
              name: 'Laptop Pro',
              price: 1299,
              description: 'High-performance laptop for professionals',
              image: 'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400'
            },
            {
              id: 2,
              name: 'Wireless Mouse',
              price: 29,
              description: 'Ergonomic wireless mouse',
              image: 'https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=400'
            },
            {
              id: 3,
              name: 'Mechanical Keyboard',
              price: 89,
              description: 'RGB mechanical keyboard',
              image: 'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400'
            },
            {
              id: 4,
              name: 'USB-C Hub',
              price: 49,
              description: 'Multi-port USB-C hub',
              image: 'https://images.unsplash.com/photo-1625948515291-69613efd103f?w=400'
            }
          ]
        }
      }
    });

    // Header Component
    app.component('app-header', {
      props: ['totalProducts'],
      template: `
        <header class="bg-white p-6 rounded-lg shadow-md mb-6 flex justify-between items-center">
          <h1 class="text-2xl md:text-3xl font-bold text-emerald-600">🛒 Vue Shop</h1>
          <div class="flex gap-4">
            <div class="bg-gray-50 px-4 py-3 rounded-lg text-center min-w-[100px]">
              <div class="text-2xl font-bold text-emerald-600">{{ totalProducts }}</div>
              <div class="text-sm text-gray-600">Products</div>
            </div>
          </div>
        </header>
      `
    });

    // Product Card Component
    app.component('product-card', {
      props: ['product'],
      data() {
        return {
          cartCount: 0
        }
      },
      template: `
        <div class="bg-white rounded-lg p-6 shadow-md hover:shadow-xl transition-all duration-300 hover:-translate-y-1">
          <img :src="product.image" :alt="product.name" class="w-full h-48 object-cover rounded-md mb-4">
          <h3 class="text-xl font-bold text-gray-800 mb-2">{{ product.name }}</h3>
          <p class="text-gray-600 text-sm mb-4">{{ product.description }}</p>
          <div class="text-2xl font-bold text-emerald-600 mb-4">\${{ product.price }}</div>
          <button 
            class="w-full px-6 py-3 bg-emerald-600 text-white rounded-lg font-semibold hover:bg-emerald-700 transition-colors duration-300"
            @click="addToCart">
            {{ cartCount === 0 ? 'Add to Cart' : \`In Cart: \${cartCount}\` }}
          </button>
        </div>
      `,
      methods: {
        addToCart() {
          this.cartCount++;
        }
      }
    });

    app.mount('#app');
  </script>
</body>
</html>

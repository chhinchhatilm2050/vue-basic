<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Validation Form</title>
</head>
<body>
    <form id="registration-form" class="flex justify-center flex-col items-center">
        <div class="form-group">
            <label for="username">Username</label><br>
            <input type="text" class="border-2 border-blue-500 rounded-xl w-100" id="username" name="username"><br>
            <span class="error-message text-red-600" id="username-error"></span>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label><br>
            <input type="email" class="border-2 border-blue-500 rounded-xl w-100" id="email" name="email"><br>
            <span class="error-message text-red-600" id="email-error"></span>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label><br>
            <input type="password" class="border-2 border-blue-500 rounded-xl w-100" id="password" name="password"><br>
            <span class="error-message text-red-600" id="password-error"></span>
        </div>
        <button type="submit" disabled id="submit-btn" class="px-3 py-1 border-1 border-blue-700 mt-5 bg-blue-700 text-white rounded-2xl disabled:opacity-50 disabled:cursor-not-allowed">Register</button>
    </form>
    <script>
        const form = document.getElementById('registration-form');
        const userName = document.getElementById('username');
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');


        const userNameError = document.getElementById('username-error');
        const emailError = document.getElementById('email-error');
        const passWordError = document.getElementById('password-error');

        const usernamePattern = /^[a-zA-Z0-9]{3,20}$/;
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

        function ValidationField(input, pattern, errorElement, errorMessage) {
            if (pattern.test(input.value)) {
                errorElement.textContent = '';
                input.classList.remove('border-red-500');
                input.classList.add('border-green-500');
                return true;
            } else {
                input.classList.remove('border-green-500');
                input.classList.add('border-red-500');
                errorElement.textContent = errorMessage;
                return false;
            }
        }
        userName.addEventListener('input', () => {
            ValidationField(userName, usernamePattern, userNameError, 'Username must be 3-20 alphanumeric characters'); 
            toggleBtn();
        });

        email.addEventListener('input', () => {
            ValidationField(email, usernamePattern, emailError, 'Enter a valid email address');
            toggleBtn();
        });

        password.addEventListener('input', () => {
            ValidationField(password, passwordPattern, passWordError, 'Password must be 8+ chars with upper, lower & number');
            toggleBtn();
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const isUsernameValid = usernamePattern.test(userName.value);
            const isEmailValid = emailPattern.test(email.value);
            const isPasswordValid = passwordPattern.test(password.value);
            if(isEmailValid && isUsernameValid && isPasswordValid) {
                const dataUser = {
                    userName : userName.value,
                    email : email.value,
                    password : password.value
                }
                localStorage.setItem('dataUser', JSON.stringify(dataUser));
                alert('Registration successful! Data saved.');
                form.reset();
            } else {
                alert('Fix all error!');
            }
        })
        function toggleBtn() {
            const isUsernameValid = usernamePattern.test(userName.value);
            const isEmailValid = emailPattern.test(email.value);
            const isPasswordValid = passwordPattern.test(password.value);
            submitBtn.disabled = !(isEmailValid && isEmailValid && isPasswordValid);
        }
    </script>

</body>
</html>
